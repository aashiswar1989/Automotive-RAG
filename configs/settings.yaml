data:
    source_pdf: 'data/raw/braking_system_requirements_merged.pdf'
    source_md: 'data/processed/braking_system_requirements.md'
    vector_db: ''

chunking:
    chunk_size: 500
    chunk_overlap: 50

embedding:
    model: 'nomic-embed-text'
    provider: 'Ollama'
    collection_name: 'markdown_header_chunks'
    persist_dir: 'data/vectorstore'

llm:
    model: 'llama3.1:8b'
    provider: 'Ollama'
    temperature: 0.7

retriever:
    k: 3
    search_type: 'similarity'
